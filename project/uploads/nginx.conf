# ─── Nginx Config — ACP Fee Billing Portal ──────────────────
# Drop this in /etc/nginx/sites-available/acp-portal
# then: sudo ln -s /etc/nginx/sites-available/acp-portal /etc/nginx/sites-enabled/
# certbot: sudo certbot --nginx -d pay.ascensionenergies.com

server {
    listen 80;
    server_name pay.ascensionenergies.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pay.ascensionenergies.com;

    # SSL — issued by Let's Encrypt via Certbot
    ssl_certificate     /etc/letsencrypt/live/pay.ascensionenergies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pay.ascensionenergies.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Proxy to Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Stripe webhook — no rate limiting
    location /webhook {
        proxy_pass         http://127.0.0.1:3000/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Must pass raw body for Stripe signature verification
        proxy_pass_request_headers on;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|ico|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
