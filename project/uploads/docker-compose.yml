version: '3.9'

services:
  acp-portal:
    build: .
    container_name: acp-fee-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./db:/app/db        # persist SQLite database
    networks:
      - acp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy (uncomment when domain is ready)
  # nginx:
  #   image: nginx:alpine
  #   container_name: acp-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - acp-portal
  #   networks:
  #     - acp-net

networks:
  acp-net:
    driver: bridge
